name: Verify Build-Time Gating

# Runs the load-bearing verify-* gates from Phase 04/04.1 on every PR and push to main.
# These gates physically grep the renderer + preload bundles to confirm that disabled
# features (OAuth providers, Stripe billing, referrals, AssemblyAI/Deepgram streaming)
# are NOT shipped when their build-time flags are off — and that they ARE shipped when on.
#
# This is the security contract for corporate-minimal builds: if a gate fails, a feature
# the maintainer thought was disabled is actually leaking into the binary.

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
  workflow_dispatch:
  workflow_call:  # Allow corporate-build.yml to invoke as reusable

jobs:
  verify-gating:
    name: Verify gating gates pass
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Ensure Electron binary downloaded
        # electron's postinstall (`node install.js`) downloads the binary from
        # GitHub; if that flakes, `require("electron")` throws "Electron failed
        # to install correctly" from src/helpers/debugLogger.js during vitest
        # collection. That broke v1.7.11/v1.7.13/v1.7.14 release CI runs.
        #
        # History of fixes:
        #  - 516e9ccc: `[ -d dist ] && ls -A dist` + re-run install.js. Too weak
        #    (passed over a partial unpack) AND silenced errors.
        #  - efa6be81: validated via require() but did `rm -rf dist path.txt`
        #    first — that DELETES a working path.txt, and when the subsequent
        #    install.js download fails the tree is left worse than found, with
        #    the real error swallowed by `2>/dev/null` / `|| true`. Self-inflicted.
        #
        # This version (per systematic-debugging): make the failure VISIBLE
        # first — dump the actual electron install state and the real install.js
        # stderr — and recover via a proper `npm rebuild electron` (which re-runs
        # the package's own install lifecycle and rewrites path.txt) WITHOUT
        # pre-deleting a possibly-good path.txt. We only `rm -rf` as a last
        # resort on the final attempt, and we never hide stderr.
        run: |
          check_electron() {
            node -e "const p=require('electron'); const fs=require('fs'); if(typeof p==='string'&&p&&fs.existsSync(p)) process.exit(0); process.exit(1)"
          }
          dump_state() {
            echo "--- electron install state ---"
            echo "path.txt: $(cat node_modules/electron/path.txt 2>/dev/null || echo '<missing>')"
            echo "dist/version: $(cat node_modules/electron/dist/version 2>/dev/null || echo '<missing>')"
            echo "package version: $(node -p "require('./node_modules/electron/package.json').version" 2>/dev/null || echo '?')"
            echo "dist/ entries: $(ls -A node_modules/electron/dist 2>/dev/null | head -5 | tr '\n' ' ')"
            echo "------------------------------"
          }
          if check_electron 2>/dev/null; then
            echo "Electron resolves correctly out of the box."
            exit 0
          fi
          echo "::warning::Electron did not resolve after npm ci; FULL diagnostic mode."
          dump_state
          # Prior fixes (cache-bypass, npm rebuild, force_no_cache) all failed
          # because install.js exits in <1s WITHOUT downloading and WITHOUT
          # emitting any stderr — meaning it never reaches downloadArtifact.
          # This run captures EVERYTHING so we stop guessing:
          echo "=== ENV (electron/skip/cache knobs) ==="
          env | grep -iE "electron|npm_config|SKIP_BINARY|^CI=" || echo "(none)"
          echo "=== electron pkg + install.js head ==="
          node -p "require('./node_modules/electron/package.json').version" || true
          echo "--- install.js first 22 lines (the early-exit guards) ---"
          sed -n '1,22p' node_modules/electron/install.js || true
          echo "=== run install.js with @electron/get DEBUG, capture exit code + ALL output ==="
          rm -rf node_modules/electron/dist node_modules/electron/path.txt
          rm -rf "$HOME/.cache/electron" 2>/dev/null || true
          set +e
          DEBUG='@electron/get:*' force_no_cache=true node node_modules/electron/install.js
          install_rc=$?
          set -e
          echo "=== install.js exit code: $install_rc ==="
          dump_state
          if check_electron 2>/dev/null; then
            echo "Electron resolves correctly after diagnostic install."
            exit 0
          fi
          echo "::error::Electron still not resolvable (install.js rc=$install_rc). See diagnostics above."
          exit 1

      - name: Install platform-specific native binaries
        run: npm install @rollup/rollup-linux-x64-gnu lightningcss-linux-x64-gnu @tailwindcss/oxide-linux-x64-gnu --no-save

      - name: Generate build config (required for typecheck — generated.ts is gitignored)
        run: node scripts/generate-build-config.js

      - name: Type check
        run: npm run typecheck

      - name: Run unit tests (Phase 07)
        # Phase 07 hybrid testing: vitest unit tests for Phase 04/04.1/05
        # additions (deriveRealtimeWssUrl, resolveBool/Value, B1 auto-disable
        # matrix, openaiRealtimeStreaming empty-URL guard, audioManager
        # streaming gate). Runs BEFORE the bundle gates so unit failures
        # fail fast (~30s vs ~13min for the full bundle gate suite).
        run: npm test

      - name: Verify pack regenerates build-config (CFG-08)
        run: npm run verify:pack-regen

      - name: Verify OAuth gating (CFG-07)
        # Asserts gcalStartOAuth (and Apple/Microsoft equivalents) are tree-shaken
        # from both renderer and preload bundles when their flags are off.
        run: npm run verify:oauth-gating

      - name: Verify feature gating (CFG-09)
        # Asserts BILLING / REFERRALS / STREAMING symbols are absent in default-build
        # and present when each respective flag is enabled.
        run: npm run verify:feature-gating

      - name: Verify realtime routing (CFG-04 + Phase 05)
        # Asserts OPENWHISPR_REALTIME_WSS_URL derives correctly from
        # OPENWHISPR_BACKEND_URL (https→wss, http→ws, path-preserving) and
        # that the api.openai.com/v1/realtime literal cannot regress silently
        # in the source tree.
        run: npm run verify:realtime-routing
