name: Verify Build-Time Gating

# Runs the load-bearing verify-* gates from Phase 04/04.1 on every PR and push to main.
# These gates physically grep the renderer + preload bundles to confirm that disabled
# features (OAuth providers, Stripe billing, referrals, AssemblyAI/Deepgram streaming)
# are NOT shipped when their build-time flags are off — and that they ARE shipped when on.
#
# This is the security contract for corporate-minimal builds: if a gate fails, a feature
# the maintainer thought was disabled is actually leaking into the binary.

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
  workflow_dispatch:
  workflow_call:  # Allow corporate-build.yml to invoke as reusable

jobs:
  verify-gating:
    name: Verify gating gates pass
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Ensure Electron binary downloaded
        # electron's postinstall (`node install.js`) downloads the binary from
        # GitHub; if that flakes, `require("electron")` throws "Electron failed
        # to install correctly" from src/helpers/debugLogger.js during vitest
        # collection. That broke v1.7.11/v1.7.13/v1.7.14 release CI runs
        # (v1.7.12 won the network coin flip).
        #
        # v1.7.14 fix: the old check tested only `[ -d dist ] && ls -A dist`.
        # That is too weak — a PARTIAL unpack leaves a non-empty `dist/` that
        # passes the dir check but still makes `require("electron")` throw,
        # because the electron entrypoint reads `path.txt` + the actual binary,
        # not just the dir. The retry then printed "present (attempt 1)" and
        # exited 0 over a broken install, so the unit-test step failed anyway.
        # Now we validate via the REAL resolver (`require("electron")` must
        # return a string path) and, on failure, do a CLEAN reinstall
        # (`rm -rf` then `install.js`) rather than re-running install over a
        # corrupt tree.
        run: |
          check_electron() {
            node -e "const p=require('electron'); if(typeof p!=='string'||!p){process.exit(1)} const fs=require('fs'); process.exit(fs.existsSync(p)?0:1)" 2>/dev/null
          }
          for attempt in 1 2 3; do
            if check_electron; then
              echo "Electron binary resolves correctly (attempt $attempt)."
              break
            fi
            echo "Electron binary invalid on attempt $attempt; clean reinstall."
            rm -rf node_modules/electron/dist node_modules/electron/path.txt
            node node_modules/electron/install.js || true
          done
          if ! check_electron; then
            echo "::error::Electron binary still not resolvable after 3 attempts."
            exit 1
          fi

      - name: Install platform-specific native binaries
        run: npm install @rollup/rollup-linux-x64-gnu lightningcss-linux-x64-gnu @tailwindcss/oxide-linux-x64-gnu --no-save

      - name: Generate build config (required for typecheck — generated.ts is gitignored)
        run: node scripts/generate-build-config.js

      - name: Type check
        run: npm run typecheck

      - name: Run unit tests (Phase 07)
        # Phase 07 hybrid testing: vitest unit tests for Phase 04/04.1/05
        # additions (deriveRealtimeWssUrl, resolveBool/Value, B1 auto-disable
        # matrix, openaiRealtimeStreaming empty-URL guard, audioManager
        # streaming gate). Runs BEFORE the bundle gates so unit failures
        # fail fast (~30s vs ~13min for the full bundle gate suite).
        run: npm test

      - name: Verify pack regenerates build-config (CFG-08)
        run: npm run verify:pack-regen

      - name: Verify OAuth gating (CFG-07)
        # Asserts gcalStartOAuth (and Apple/Microsoft equivalents) are tree-shaken
        # from both renderer and preload bundles when their flags are off.
        run: npm run verify:oauth-gating

      - name: Verify feature gating (CFG-09)
        # Asserts BILLING / REFERRALS / STREAMING symbols are absent in default-build
        # and present when each respective flag is enabled.
        run: npm run verify:feature-gating

      - name: Verify realtime routing (CFG-04 + Phase 05)
        # Asserts OPENWHISPR_REALTIME_WSS_URL derives correctly from
        # OPENWHISPR_BACKEND_URL (https→wss, http→ws, path-preserving) and
        # that the api.openai.com/v1/realtime literal cannot regress silently
        # in the source tree.
        run: npm run verify:realtime-routing
