name: Corporate Minimal Build

# Builds the corporate-minimal binary (default build, no Stripe/Referrals/Streaming)
# for all 3 platforms. Triggered by ANY Yambr release tag (v*.*.*.* — 4-segment
# scheme per CLAUDE.md versioning rules) or manual workflow_dispatch.
#
# Per the 2026-05-08 corporate-minimal pivot:
# - OAuth providers default ON (set OPENWHISPR_OAUTH_*=false to disable per-provider)
# - Stripe billing OFF (OPENWHISPR_BILLING=true to enable)
# - Referrals OFF (OPENWHISPR_REFERRALS=true to enable)
# - Streaming ASR OFF (OPENWHISPR_STREAMING=true to enable)
#
# Tag-name → resolved app version: the workflow extracts the tag (e.g. v1.7.2.1)
# and passes it to electron-builder via --config.extraMetadata.version override
# so the produced binary, blockmap, and GitHub Release point at the Yambr tag,
# not the upstream baseline in package.json.

on:
  push:
    tags:
      - "v*.*.*.*"  # Yambr 4-segment tags (v1.7.2.1, v1.7.2.2, v1.7.3.1, ...)
  workflow_dispatch:
    inputs:
      backend_url:
        description: "VITE_OPENWHISPR_API_URL (corporate backend base URL, leave empty for offline-only)"
        required: false
        type: string
        default: ""
      auth_url:
        description: "VITE_OPENWHISPR_AUTH_URL (corporate better-auth backend)"
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  verify-gates:
    # Run gating gates first as a hard precondition — no point building if gates fail
    uses: ./.github/workflows/verify-gating.yml

  build-mac:
    needs: verify-gates
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Resolve Yambr version from git tag
        # Strip leading "v" from tag (v1.7.2.1 → 1.7.2.1) so electron-builder
        # uses the Yambr version for binary naming, blockmap, and GitHub Release.
        # If invoked via workflow_dispatch (no tag), fall back to upstream package.json version.
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            APP_VERSION="${GITHUB_REF_NAME#v}"
          else
            APP_VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved app version: ${APP_VERSION}"

      - name: Install dependencies
        run: npm ci

      - name: Cache native binaries
        uses: actions/cache@v4
        with:
          path: resources/bin
          key: mac-arm64-bin-${{ hashFiles('scripts/download-*.js') }}

      - name: Download all sidecar binaries (macOS arm64)
        run: |
          node scripts/download-whisper-cpp.js --current
          node scripts/download-llama-server.js --current
          node scripts/download-sherpa-onnx.js --current
          node scripts/download-qdrant.js --current
          node scripts/download-meeting-aec-helper.js --current
          node scripts/download-diarization-models.js --output-dir resources/bin/diarization-models
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

      - name: Build macOS (corporate-minimal, all flags default false except OAuth)
        run: |
          node scripts/generate-build-config.js
          npm run build:renderer
          npx electron-builder --mac --arm64 \
            --config.extraMetadata.version=${{ steps.version.outputs.version }} \
            --publish never
        env:
          OPENWHISPR_BILLING: "false"
          OPENWHISPR_REFERRALS: "false"
          OPENWHISPR_STREAMING: "false"
          VITE_OPENWHISPR_API_URL: ${{ inputs.backend_url }}
          VITE_OPENWHISPR_AUTH_URL: ${{ inputs.auth_url }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Verify built artifact has corporate-minimal posture
        run: |
          npm run verify:oauth-gating
          npm run verify:feature-gating

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwhispr-corp-mac-arm64
          path: dist/*.dmg
          retention-days: 30

  build-linux:
    needs: verify-gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Resolve Yambr version from git tag
        # Strip leading "v" from tag (v1.7.2.1 → 1.7.2.1) so electron-builder
        # uses the Yambr version for binary naming, blockmap, and GitHub Release.
        # If invoked via workflow_dispatch (no tag), fall back to upstream package.json version.
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            APP_VERSION="${GITHUB_REF_NAME#v}"
          else
            APP_VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved app version: ${APP_VERSION}"

      - name: Install dependencies
        run: npm ci

      - name: Install platform-specific native binaries
        run: npm install @rollup/rollup-linux-x64-gnu lightningcss-linux-x64-gnu @tailwindcss/oxide-linux-x64-gnu --no-save

      - name: Cache native binaries
        uses: actions/cache@v4
        with:
          path: resources/bin
          key: linux-x64-bin-${{ hashFiles('scripts/download-*.js') }}

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libx11-dev libxtst-dev libatspi2.0-dev libglib2.0-dev

      - name: Download all sidecar binaries (Linux x64)
        run: |
          node scripts/download-whisper-cpp.js --current
          node scripts/download-llama-server.js --current
          node scripts/download-sherpa-onnx.js --current
          node scripts/download-qdrant.js --current
          node scripts/download-meeting-aec-helper.js --current
          node scripts/download-diarization-models.js --output-dir resources/bin/diarization-models
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

      - name: Build Linux (corporate-minimal)
        run: |
          node scripts/generate-build-config.js
          npm run build:renderer
          npx electron-builder --linux \
            --config.extraMetadata.version=${{ steps.version.outputs.version }} \
            --publish never
        env:
          OPENWHISPR_BILLING: "false"
          OPENWHISPR_REFERRALS: "false"
          OPENWHISPR_STREAMING: "false"
          VITE_OPENWHISPR_API_URL: ${{ inputs.backend_url }}
          VITE_OPENWHISPR_AUTH_URL: ${{ inputs.auth_url }}

      - name: Verify built artifact
        run: |
          npm run verify:oauth-gating
          npm run verify:feature-gating

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwhispr-corp-linux-x64
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.tar.gz
          retention-days: 30

  build-windows:
    needs: verify-gates
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Resolve Yambr version from git tag
        # Strip leading "v" from tag (v1.7.2.1 → 1.7.2.1) so electron-builder
        # uses the Yambr version for binary naming, blockmap, and GitHub Release.
        # If invoked via workflow_dispatch (no tag), fall back to upstream package.json version.
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            APP_VERSION="${GITHUB_REF_NAME#v}"
          else
            APP_VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved app version: ${APP_VERSION}"

      - name: Install dependencies
        run: npm ci

      - name: Cache native binaries
        uses: actions/cache@v4
        with:
          path: resources/bin
          key: win-x64-bin-${{ hashFiles('scripts/download-*.js') }}

      - name: Download all sidecar binaries (Windows x64)
        run: |
          node scripts/download-whisper-cpp.js --current
          node scripts/download-llama-server.js --current
          node scripts/download-sherpa-onnx.js --current
          node scripts/download-qdrant.js --current
          node scripts/download-meeting-aec-helper.js --current
          node scripts/download-diarization-models.js --output-dir resources/bin/diarization-models
          node scripts/download-nircmd.js
          node scripts/download-windows-fast-paste.js
          node scripts/download-windows-key-listener.js
          node scripts/download-windows-mic-listener.js
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

      - name: Build Windows (corporate-minimal)
        run: |
          node scripts/generate-build-config.js
          npm run build:renderer
          npx electron-builder --win --config.extraMetadata.version=${{ steps.version.outputs.version }} --publish never
        env:
          OPENWHISPR_BILLING: "false"
          OPENWHISPR_REFERRALS: "false"
          OPENWHISPR_STREAMING: "false"
          VITE_OPENWHISPR_API_URL: ${{ inputs.backend_url }}
          VITE_OPENWHISPR_AUTH_URL: ${{ inputs.auth_url }}

      - name: Verify built artifact
        run: |
          npm run verify:oauth-gating
          npm run verify:feature-gating

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwhispr-corp-win-x64
          path: dist/*.exe
          retention-days: 30

  publish-release:
    # Create a GitHub Release with all platform artifacts attached.
    # Only runs on tag pushes (not workflow_dispatch).
    needs: [build-mac, build-linux, build-windows]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          ls -la artifacts/
          find artifacts/ -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.tar.gz" \) | head -20

      - name: Create GitHub Release with artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          # Aggregate all platform binaries into one release
          mapfile -t FILES < <(find artifacts/ -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.tar.gz" \))

          echo "Creating release ${TAG_NAME} with ${#FILES[@]} artifact(s)"

          # Create release notes from CHANGELOG if present, else from tag annotation
          if [ -f CHANGELOG.md ]; then
            NOTES_FROM_CHANGELOG=$(awk "/^## \[?${TAG_NAME#v}/{flag=1; next} /^## \[?[0-9]/{flag=0} flag" CHANGELOG.md)
          fi

          if [ -n "${NOTES_FROM_CHANGELOG:-}" ]; then
            echo "${NOTES_FROM_CHANGELOG}" > release-notes.md
          else
            git tag -l --format='%(contents)' "${TAG_NAME}" > release-notes.md
          fi

          # Append corporate-minimal posture banner
          cat >> release-notes.md <<EOF

---
**Build posture:** corporate-minimal (default)
- OAuth providers: enabled (Google/Apple/Microsoft)
- Stripe billing UI: **disabled**
- Referral program UI: **disabled**
- Third-party realtime ASR: **disabled**
- Realtime via corporate backend (set OPENWHISPR_BACKEND_URL when building)
EOF

          gh release create "${TAG_NAME}" "${FILES[@]}" \
            --title "${TAG_NAME}" \
            --notes-file release-notes.md \
            --verify-tag
